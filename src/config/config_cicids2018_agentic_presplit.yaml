project:
  name: "network-attack-detection"
  version: "0.2.0"
  description: "Pre-split CIC-IDS-2018 flow/log fusion with threat-intel decision fusion"

data:
  raw_dir: "data/raw/CIC-IDS-2018"
  processed_dir: "data/processed"
  log_dir: "data/logs"

  multimodal:
    enabled: true
    input_format: "pre_split"
    label_column: "label"
    id_column: "sample_id"
    flow:
      name: "flow"
    log:
      name: "log"
    splits:
      train:
        flow_path: "data/processed/train_flow.csv"
        log_path: "data/processed/train_log.csv"
        label_path: "data/processed/train_label.csv"
        id_path: "data/processed/train_ids.csv"
      val:
        flow_path: "data/processed/val_flow.csv"
        log_path: "data/processed/val_log.csv"
        label_path: "data/processed/val_label.csv"
        id_path: "data/processed/val_ids.csv"
      test:
        flow_path: "data/processed/test_flow.csv"
        log_path: "data/processed/test_log.csv"
        label_path: "data/processed/test_label.csv"
        id_path: "data/processed/test_ids.csv"

  institutional_sources: []

  threat_intel:
    enabled: false
    source_name: "threat_intel"
    source_path: null
    split_paths:
      train: "data/threat_intel/train_intel.csv"
      val: "data/threat_intel/val_intel.csv"
      test: "data/threat_intel/test_intel.csv"
    join_strategy: "key"
    join_key: "sample_id"
    intel_key: "sample_id"
    feature_columns: null

  preprocessing:
    binary_classification: false
    feature_selection: "all"
    normalize: false

  balance:
    enabled: false
    method: "smote"

  split:
    test_size: 0.2
    val_size: 0.1
    stratify: true
    random_state: 42

  loader:
    batch_size: 256
    num_workers: 8
    pin_memory: true
    use_weighted_sampler: true
    augment_train: false

model:
  type: "decision_fusion_net"

  architecture:
    hidden_dim: 256
    num_layers: 3
    dropout: 0.3
    activation: "relu"
    encoder_type: "mlp"

  fusion:
    method: "attention"
    attention_heads: 4

  decision_fusion:
    hidden_dim: 256
    threat_encoder_type: "mlp"
    threat_intel_dim: null

  agentic_mode:
    enabled: true
    uncertainty_threshold: 0.55
    intel_confidence_threshold: 0.70
    benign_class_idx: 0
    suspicious_class_indices: []
    consensus_boost: 0.15

  input_dim: null
  source1_dim: null
  source2_dim: null
  num_classes: null

training:
  epochs: 100
  batch_size: 256

  optimizer:
    type: "adamw"
    learning_rate: 0.001
    weight_decay: 0.0001
    momentum: 0.9
    betas: [0.9, 0.999]

  scheduler:
    type: "cosine"
    warmup_epochs: 5
    step_size: 30
    gamma: 0.1
    min_lr: 0.00001

  early_stopping:
    enabled: true
    patience: 20
    min_delta: 0.0005
    monitor: "val_f1_macro"
    mode: "max"

  loss:
    type: "class_balanced"
    class_weights: null
    class_balanced_loss_type: "focal"
    focal_gamma: 2.0
    beta: 0.9999
    label_smoothing: 0.0

  gradient_clip:
    enabled: true
    max_norm: 1.0

  mixed_precision: true

  checkpoint:
    save_best: true
    save_last: true
    save_every: 10

evaluation:
  metrics:
    - accuracy
    - precision
    - recall
    - f1_score
    - auc_roc
    - confusion_matrix

  eval_every: 1
  per_class_metrics: true

experiment:
  name: null
  seed: 42
  deterministic: true
  device: "auto"
  multi_gpu: false

output:
  checkpoint_dir: "outputs/checkpoints"
  results_dir: "outputs/results"
  figures_dir: "outputs/figures"
  logs_dir: "outputs/logs"

logging:
  level: "INFO"
  tensorboard: true
  wandb: false
  log_every: 10
